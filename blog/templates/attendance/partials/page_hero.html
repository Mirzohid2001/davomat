<div class="page-hero page-hero--premium">
  <div class="page-hero__glow" aria-hidden="true"></div>
  <div class="page-hero__glow page-hero__glow--2" aria-hidden="true"></div>
  <div class="page-hero__content">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
      <div>
        <h1 class="page-hero-title">
          {% if icon %}<i class="bi {{ icon }} me-2"></i>{% endif %}{{ title }}
        </h1>
        {% if subtitle %}<p class="page-hero-sub">{{ subtitle }}</p>{% endif %}
      </div>
      {% if meta %}
      <div class="text-md-end">
        <span class="page-hero-meta">{{ meta }}</span>
        {% if meta_label %}<small class="page-hero-meta-label">{{ meta_label }}</small>{% endif %}
      </div>
      {% endif %}
    </div>
  </div>
</div>
