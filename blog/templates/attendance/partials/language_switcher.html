{% load i18n %}
{% get_current_language as CURRENT_LANG %}
<div class="lang-switcher d-flex align-items-center gap-1">
  {% for lang_code, lang_name in LANGUAGES %}
  <form action="{% url 'set_language' %}" method="post" class="d-inline m-0">
    {% csrf_token %}
    <input type="hidden" name="language" value="{{ lang_code }}">
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    <button type="submit"
            class="btn btn-sm lang-switcher__btn {% if lang_code == CURRENT_LANG %}lang-switcher__btn--active{% endif %}"
            title="{{ lang_name }}">
      {{ lang_code|upper }}
    </button>
  </form>
  {% endfor %}
</div>
