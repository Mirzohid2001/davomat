<div class="app-empty app-empty--premium py-5">
  <div class="app-empty-icon"><i class="bi {{ icon|default:'bi-inbox' }}"></i></div>
  <h3 class="app-empty-title">{{ title|default:"Ma'lumot topilmadi" }}</h3>
  {% if text %}<p class="app-empty-text">{{ text }}</p>{% endif %}
  {% if action_url %}
  <a href="{{ action_url }}" class="btn btn-primary btn-premium mt-3 px-4">{{ action_label|default:"Orqaga" }}</a>
  {% endif %}
</div>
