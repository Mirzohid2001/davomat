{% load i18n %}
<div class="app-empty app-empty--premium py-5">
  <div class="app-empty-icon"><i class="bi {{ icon|default:'bi-inbox' }}"></i></div>
  <h3 class="app-empty-title">{% trans "Ma'lumot topilmadi" as default_title %}{{ title|default:default_title }}</h3>
  {% if text %}<p class="app-empty-text">{{ text }}</p>{% endif %}
  {% if action_url %}
  <a href="{{ action_url }}" class="btn btn-primary btn-premium mt-3 px-4">{% trans "Orqaga" as default_action %}{{ action_label|default:default_action }}</a>
  {% endif %}
</div>
